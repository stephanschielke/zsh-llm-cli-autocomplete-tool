[settings]
experimental = true
unix_default_inline_shell_args = "zsh -c"

[tools]
uv = "latest"
# ollama = "latest"

[settings.python]
uv_venv_auto = "create|source"
uv_venv_create_args = [
    #"--verbose",
    "--quiet",
    "--seed",
    "--allow-existing"
]

[tasks.install-dependencies]
run = """
uv lock
if [[ "${INSTALL_TRAINING_DEPS:-0}" = "1" ]]; then
    uv sync --extra="training"
else
    uv sync
fi
# Install this pyproject as `model-cli-autocomplete` package
uv pip install --editable .
"""

[tasks.install-ollama]
run = """
if [[ -z "$(command -v ollama)" ]]; then
    echo "Installing ollama..."
    curl -s https://ollama.ai/install | sh
fi
"""

[tasks.setup-ollama]
run = """
#!/usr/bin/env -S uv run --script
import sys
sys.path.insert(0, 'src')
from model_completer.ollama_manager import create_ollama_manager

manager = create_ollama_manager()
if not manager.is_installed():
    print('Installing Ollama...')
    if manager.install():
        print('Ollama installed successfully')
    else:
        print('Failed to install Ollama')
        sys.exit(1)
else:
    print('Ollama already installed')

if not manager.is_running():
    print('Starting Ollama server...')
    if manager.start_server():
        print('Ollama server started')
    else:
        print('Failed to start Ollama server')
        sys.exit(1)
else:
    print('Ollama server already running')

print('Setting up default models...')
if manager.setup_default_models():
    print('Default models setup completed')
else:
    print('Failed to setup default models')

"""

[tasks.generate-training-data]
run = "model-completer --generate-data"


[env]
# MISE_VERBOSE = true
# UV_MANAGED_PYTHON = true
PYTHONPATH = "{{config_root}}"

INSTALL_TRAINING_DEPS = "1"
GENERATE_TRAINING_DATA = "1"

OLLAMA_HOST = "127.0.0.1"
OLLAMA_PORT = "11434"

MODEL_COMPLETION_DAEMON_PORT = "11435"

